task: video_classification

model:
  name: VideoViT
  in_channels: 3
  hidden_size: 768
  depth: 12
  num_heads: 12
  patch_size: [2, 16, 16]
  num_frames: 16
  image_size: 224

data:
  dataset: kinetics
  root: data/kinetics400/
  num_frames: 16
  frame_stride: 2
  image_size: 224
  batch_size: 16
  num_workers: 8
  sampler: uniform

train:
  epochs: 50
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 2000
  scheduler: cosine
  mixed_precision: true
  gradient_checkpointing: false
  gradient_accumulation: 1
  max_grad_norm: 1.0
  save_every: 5
  eval_every: 1
  output_dir: workspace/understanding/

device: auto
seed: 42
